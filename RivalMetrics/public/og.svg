  <line x1="400" y1="0" x2="400" y2="630" stroke="#E7E5F1" stroke-width="0.5" opacity="0.5"/>
  <line x1="500" y1="0" x2="500" y2="630" stroke="#E7E5F1" stroke-width="0.5" opacity="0.5"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#E7E5F1" stroke-width="0.5" opacity="0.5"/>
  <line x1="700" y1="0" x2="700" y2="630" stroke="#E7E5F1" stroke-width="0.5" opacity="0.5"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#E7E5F1" stroke-width="0.5" opacity="0.5"/>
  <line x1="900" y1="0" x2="900" y2="630" stroke="#E7E5F1" stroke-width="0.5" opacity="0.5"/>
  <line x1="1000" y1="0" x2="1000" y2="630" stroke="#E7E5F1" stroke-width="0.5" opacity="0.5"/>
  <line x1="1100" y1="0" x2="1100" y2="630" stroke="#E7E5F1" stroke-width="0.5" opacity="0.5"/>
  <line x1="1200" y1="0" x2="1200" y2="630" stroke="#E7E5F1" stroke-width="0.5" opacity="0.5"/>
  <line x1="0" y1="0" x2="1200" y2="0" stroke="#E7E5F1" stroke-width="0.5" opacity="0.5"/>
  <line x1="0" y1="105" x2="1200" y2="105" stroke="#E7E5F1" stroke-width="0.5" opacity="0.5"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#E7E5F1" stroke-width="0.5" opacity="0.5"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#E7E5F1" stroke-width="0.5" opacity="0.5"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#E7E5F1" stroke-width="0.5" opacity="0.5"/>
  <line x1="0" y1="525" x2="1200" y2="525" stroke="#E7E5F1" stroke-width="0.5" opacity="0.5"/>
  <line x1="0" y1="630" x2="1200" y2="630" stroke="#E7E5F1" stroke-width="0.5" opacity="0.5"/>

  <!-- Logo mark -->
  <g transform="translate(100, 190) scale(0.5)">
    <rect x="56" y="56" width="400" height="400" rx="96" ry="96"
