    RivalMetrics
  </text>

  <!-- Tagline -->
  <text x="380" y="340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
    font-size="24" font-weight="500" fill="#5b5870">
