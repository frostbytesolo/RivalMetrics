  </text>

  <!-- Brand bar -->
  <rect x="100" y="540" width="1000" height="2" fill="url(#og-grad)" rx="1" opacity="0.3"/>

  <!-- Footer -->
  <text x="600" y="575" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
